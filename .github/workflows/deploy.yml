name: Deploy

# Auto-deploy to the droplet on every push to main.
# Requires three repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     — droplet public IP
#   DEPLOY_USER     — SSH user (root)
#   DEPLOY_SSH_KEY  — private SSH key whose public half is in the droplet's authorized_keys
# See DEPLOY.md → "Automatic deploys" for the one-time droplet/GitHub setup.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

# Never run two deploys at the same time; cancel an in-flight one if a newer push lands.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true # abort on the first failing command
          script: |
            set -e
            cd /opt/nissan
            git pull origin main
            docker compose up -d --build
            # Retain hashed static assets across deploys so tabs loaded before a
            # deploy don't 404 on old chunks. Copy is additive (docker cp never
            # deletes); prune ages out builds older than 7 days to bound disk use.
            mkdir -p /opt/nissan/next-cache/_next/static
            docker cp nissan_web:/app/.next/static/. /opt/nissan/next-cache/_next/static/
            find /opt/nissan/next-cache/_next/static -type f -mtime +7 -delete
            docker image prune -f
