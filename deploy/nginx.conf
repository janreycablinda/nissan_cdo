# Reverse proxy for the Nissan CDO site.
# Copy to /etc/nginx/sites-available/nissan on the droplet, symlink into sites-enabled,
# then run: certbot --nginx -d nissancagayandeoro.com -d www.nissancagayandeoro.com
# (certbot rewrites this for HTTPS/443 and adds the redirect automatically).

server {
    listen 80;
    listen [::]:80;
    server_name nissancagayandeoro.com www.nissancagayandeoro.com;

    # Allow large media uploads through the admin Media Library.
    client_max_body_size 64M;

    # Serve admin-uploaded media straight from disk. The Next.js standalone server
    # only serves public/ files baked in at build time, not ones added at runtime
    # (uploads land here via the docker bind mount), so Nginx handles them directly.
    location /images/uploads/ {
        alias /opt/nissan/public/images/uploads/;
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    # Serve hashed build assets from a directory that accumulates across deploys,
    # so tabs/caches loaded before a deploy don't 404 on old chunks (every build
    # replaces the hashed filenames). Falls back to the live app for brand-new
    # chunks not yet copied to disk. Uses `root` (not `alias`) because try_files
    # + alias has a known matching quirk.
    location /_next/static/ {
        root /opt/nissan/next-cache;   # maps /_next/static/x.js -> /opt/nissan/next-cache/_next/static/x.js
        try_files $uri @app;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support websocket/HMR-style upgrades if ever needed.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }

    # Fallback target for /_next/static/ misses — proxy to the running app.
    location @app {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
