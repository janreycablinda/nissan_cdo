# Reverse proxy for the Nissan CDO site.
# Copy to /etc/nginx/sites-available/nissan on the droplet, symlink into sites-enabled,
# then run: certbot --nginx -d nissancagayandeoro.com -d www.nissancagayandeoro.com
# (certbot rewrites this for HTTPS/443 and adds the redirect automatically).

server {
    listen 80;
    listen [::]:80;
    server_name nissancagayandeoro.com www.nissancagayandeoro.com;

    # Allow large media uploads through the admin Media Library.
    client_max_body_size 64M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support websocket/HMR-style upgrades if ever needed.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
