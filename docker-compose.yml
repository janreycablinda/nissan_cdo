services:
  db:
    image: mysql:8.0
    container_name: nissan_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: nissan
      MYSQL_USER: nissan
      MYSQL_PASSWORD: ${DB_PASSWORD:-nissanpass}
    ports:
      # Bound to localhost only — reach it via SSH tunnel, never the public internet.
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5
    container_name: nissan_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      # Localhost only — access via SSH tunnel (ssh -L 8080:127.0.0.1:8080 ...).
      - "127.0.0.1:8080:80"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    container_name: nissan_web
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: nissan
      DB_PASSWORD: ${DB_PASSWORD:-nissanpass}
      DB_NAME: nissan
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-nissan123}
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me}
    ports:
      # Localhost only — Nginx on the host reverse-proxies 443 → this.
      - "127.0.0.1:3000:3000"
    volumes:
      # Persist uploaded media across container rebuilds (and serve it on the site).
      - ./public/images/uploads:/app/public/images/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
